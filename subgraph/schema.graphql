# Goldsky subgraph schema for Arcade charts + stats + referral.
#
# Trade  -- one row per on-chain trade (launchpad Buy/Sell OR V3 pool Swap) with
#           price + the TRADER, for charts (bucketize in TS) and per-wallet reads.
# Trader -- per-address running volume, for the referral earnings computation and
#           the unique-wallet stat (subgraphs can't COUNT DISTINCT cheaply).
# Token  -- launchpad token lifecycle (creator, mode, graduated) for /stats.
# Global -- a single running-totals row for O(1) /stats aggregate reads.

type Trade @entity(immutable: true) {
  id: ID!
  # The token being priced (the non-USDC side).
  token: Bytes!
  # The wallet that traded: Buy.buyer / Sell.seller / Swap.recipient.
  trader: Bytes!
  # "curve" (launchpad Buy/Sell) | "v3" (pool Swap).
  source: String!
  pool: Bytes
  price: BigDecimal!
  volumeUsdc: BigDecimal!
  isBuy: Boolean!
  blockTime: Int!
  blockNumber: BigInt!
  logIndex: Int!
}

type Pool @entity(immutable: false) {
  id: ID!
  token0: Bytes!
  token1: Bytes!
  token: Bytes!
  usdcIsToken0: Boolean!
}

type Trader @entity(immutable: false) {
  # The wallet address (lowercase hex).
  id: ID!
  firstSeenAt: Int!
  # Cumulative USDC volume this wallet has traded (human units). The referral
  # earnings query reads this per verified referred wallet; the fee %/share/cap
  # policy is applied OFF-CHAIN in referralPayout.ts (so it can change without a
  # subgraph re-backfill).
  totalVolumeUsdc: BigDecimal!
  tradeCount: Int!
}

type Token @entity(immutable: false) {
  # The launchpad token address (lowercase hex).
  id: ID!
  creator: Bytes!
  # 0=PUMP, 1=CLANKER, 2=CLANKER_V3 (uint8 on chain).
  mode: Int!
  createdAt: Int!
  migrated: Boolean!
  migratedAt: Int
  # The V2/V3 pair the curve graduated into (null pre-graduation).
  migratedPair: Bytes
}

# Single running-totals row (id = "global") for cheap /stats reads.
type Global @entity(immutable: false) {
  id: ID!
  totalVolumeUsdc: BigDecimal!
  tradeCount: Int!
  tokenCount: Int!
  graduatedCount: Int!
  uniqueTraders: Int!
}
