# Goldsky subgraph schema for Arcade charts + stats + referral.
#
# Trade  -- one row per on-chain trade (launchpad Buy/Sell OR V3 pool Swap) with
#           price + the TRADER, for charts (bucketize in TS) and per-wallet reads.
# Trader -- per-address running volume, for the referral earnings computation and
#           the unique-wallet stat (subgraphs can't COUNT DISTINCT cheaply).
# Token  -- launchpad token lifecycle (creator, mode, graduated) for /stats.
# Global -- a single running-totals row for O(1) /stats aggregate reads.

type Trade @entity(immutable: true) {
  id: ID!
  # The token being priced (the non-USDC side).
  token: Bytes!
  # The wallet that traded: Buy.buyer / Sell.seller / Swap.recipient.
  trader: Bytes!
  # "curve" (launchpad Buy/Sell) | "v3" (pool Swap).
  source: String!
  pool: Bytes
  price: BigDecimal!
  volumeUsdc: BigDecimal!
  isBuy: Boolean!
  blockTime: Int!
  blockNumber: BigInt!
  logIndex: Int!
  # PROTOCOL (treasury) fee this trade generated, in USDC. This is what Arcade
  # actually keeps -- NOT the LP fee, NOT the creator cut -- so a referral paid
  # as a fraction of it is self-funding by construction. Referral earnings read
  # THIS, not raw volume: crediting a fixed bps of gross volume would pay out on
  # trades where the protocol earned nothing (a pool the trader LPs, an external
  # venue), letting a wash-trader drain the referral wallet. Conservative by
  # design: it never exceeds the real treasury take, so it can only under-credit,
  # never over-pay. See recordTrade for the per-venue rates.
  protocolFeeUsdc: BigDecimal!
}

type Pool @entity(immutable: false) {
  id: ID!
  token0: Bytes!
  token1: Bytes!
  token: Bytes!
  usdcIsToken0: Boolean!
  # V3 fee tier in hundredths of a bip (e.g. 3000 = 0.30%). Used to derive
  # per-pool fees = volume x feeTier/1e6 for the Explore daily-fees/APR columns.
  feeTier: Int!
  # "v2" | "v3" -- how the pool's USDC reserve is tracked (Sync vs balanceOf).
  kind: String!
  # True once the V3 locker reports a PositionLocked for this pool: only then
  # does Arcade actually collect a protocol cut of the pool's LP fees (via the
  # compounder). A V3 pool anyone can create through the factory but never lock
  # earns Arcade nothing, so referral must NOT credit protocol fees on it.
  arcadeLocked: Boolean!
  # USDC-side reserve of the pool (human USDC). V2: exact from Sync; V3: read
  # from USDC.balanceOf(pool) on each swap. Pool TVL ~= usdcReserve x 2.
  usdcReserve: BigDecimal!
}

# Per-pool daily bucket (any USDC pool: V3 today, V2 later) for the Explore
# per-row "1D volume", "daily fees" and APR. id = `${pool}-${dayStartUnix}`.
type PoolDayData @entity(immutable: false) {
  id: ID!
  pool: Bytes!
  date: Int!
  volumeUsdc: BigDecimal!
  feesUsdc: BigDecimal!
  tradeCount: Int!
}

# Protocol-wide daily bucket for the Explore hero sparklines (Volume + Fees over
# time, with per-day tooltip detail). id = `${dayStartUnix}`.
type GlobalDayData @entity(immutable: false) {
  id: ID!
  date: Int!
  volumeUsdc: BigDecimal!
  feesUsdc: BigDecimal!
  tradeCount: Int!
  # Last-known protocol TVL snapshot for the day (from Global.tvlUsdc).
  tvlUsdc: BigDecimal!
}

type Trader @entity(immutable: false) {
  # The wallet address (lowercase hex).
  id: ID!
  firstSeenAt: Int!
  # Cumulative USDC volume this wallet has traded (human units). The referral
  # earnings query reads this per verified referred wallet; the fee %/share/cap
  # policy is applied OFF-CHAIN in referralPayout.ts (so it can change without a
  # subgraph re-backfill).
  totalVolumeUsdc: BigDecimal!
  tradeCount: Int!
}

type Token @entity(immutable: false) {
  # The launchpad token address (lowercase hex).
  id: ID!
  creator: Bytes!
  # 0=PUMP, 1=CLANKER, 2=CLANKER_V3 (uint8 on chain).
  mode: Int!
  createdAt: Int!
  migrated: Boolean!
  migratedAt: Int
  # The V2/V3 pair the curve graduated into (null pre-graduation).
  migratedPair: Bytes
  # --- Metadata (from TokenCreated / TokenLaunched), so the frontend can render
  #     logos + names without a per-token getLogs scan. ---
  name: String
  symbol: String
  metadataURI: String
  # --- Per-token running aggregates (updated per trade in recordTrade). Remove
  #     the client-side volume/fee scans. ---
  totalVolumeUsdc: BigDecimal!
  tradeCount: Int!
  # Cumulative swap fees generated by this token (USDC side of RoyaltyPaid).
  feesUsdc: BigDecimal!
  # Latest traded price (USDC per token), for O(1) market-cap reads.
  lastPriceUsdc: BigDecimal!
  # Net USDC in the pool = cumulative buy volume - sell volume, floored at 0.
  # For a single-sided CLANKER this is the USDC-side liquidity depth.
  usdcLiquidity: BigDecimal!
  # Live holder count (balances that crossed 0 -> positive, from Transfer).
  holderCount: Int!
}

# Per-holder ERC20 balance for a launched token, from the Transfer template.
# Lets the frontend read the holders list (orderBy balanceRaw) without a
# client-side Transfer scan. id = `${token}-${holder}` (both lowercase hex).
type TokenBalance @entity(immutable: false) {
  id: ID!
  token: Bytes!
  holder: Bytes!
  balanceRaw: BigInt!
  lastUpdate: Int!
}

# Per-token daily bucket for "1D volume", "daily fees", APR inputs, and OHLC.
# id = `${token}-${dayStartUnix}`. dayStart = blockTime / 86400 * 86400.
type TokenDayData @entity(immutable: false) {
  id: ID!
  token: Bytes!
  date: Int!
  volumeUsdc: BigDecimal!
  feesUsdc: BigDecimal!
  tradeCount: Int!
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!
}

# Single running-totals row (id = "global") for cheap /stats reads.
type Global @entity(immutable: false) {
  id: ID!
  totalVolumeUsdc: BigDecimal!
  tradeCount: Int!
  tokenCount: Int!
  graduatedCount: Int!
  uniqueTraders: Int!
  # Live protocol TVL (sum of every tracked pool's usdcReserve x 2), delta-updated.
  tvlUsdc: BigDecimal!
}

# Per-creator running totals for the /stats "top creators" breakdown. A creator
# is credited the trading volume of every launchpad token they created: curve
# Buy/Sell (all modes) PLUS graduated V3 pool Swaps (CLANKER_V3 mode). Note the
# subgraph does NOT index post-graduation V2 pairs (PUMP/CLANKER graduate to a
# V2 pair, only CLANKER_V3 to a V3 pool), so totalVolumeUsdc is a FLOOR of true
# creator-attributable volume. The fee it implies (CREATOR_FEE_BPS) is applied
# OFF-CHAIN in stats.ts so the rate can change without a re-backfill -- the same
# policy split the referral earnings use.
type Creator @entity(immutable: false) {
  # The creator wallet address (lowercase hex).
  id: ID!
  # Tokens this wallet has launched.
  tokenCount: Int!
  # Trades observed across all of this creator's tokens.
  tradeCount: Int!
  # Cumulative USDC volume across those trades (human units, 6-dp).
  totalVolumeUsdc: BigDecimal!
  # Of totalVolumeUsdc, the portion from swaps on the token's OFFICIAL migrated
  # V3 pool (Token.migratedPair) -- where the ~80% creator LP-fee share accrues.
  # Swaps on a permissionless third-party V3 pool for the token are NOT counted
  # here (they would let anyone inflate a creator's fee number). stats.ts uses
  # this as the higher-rate bucket of the two-part creator fee estimate (curve
  # volume = totalVolumeUsdc - graduatedVolumeUsdc gets the lower curve rate).
  graduatedVolumeUsdc: BigDecimal!
  firstSeenAt: Int!
  lastTradeAt: Int!
}

# ---------------------------------------------------------------------------
# V4 ArcadeHook (new fee-model launchpad). V4 events key by PoolId (bytes32);
# V4Pool maps a PoolId back to its token so curve trades feed the same Trade /
# Token / Creator entities as V2/V3.
# ---------------------------------------------------------------------------

# Internal PoolId -> token map, written on LaunchCreated.
type V4Pool @entity(immutable: false) {
  # PoolId (bytes32 hex).
  id: ID!
  token: Bytes!
  creator: Bytes!
  mode: Int!
}

# A CLANKER launch that routed its creator fees to a Twitter handle. Powers the
# /claim UI (which PoolId belongs to which @handle) and the backend attestation.
type HandleAttribution @entity(immutable: false) {
  # PoolId (bytes32 hex).
  id: ID!
  token: Bytes!
  handle: String!
  escrow: Bytes!
  createdAt: Int!
}

# Per-(positionId, slot, token) escrow balance, tracked from Credited/Claimed so
# the /claim UI can show a handle owner what is claimable without an RPC scan.
type EscrowSlot @entity(immutable: false) {
  # positionId(hex)-slotIndex-token(hex).
  id: ID!
  positionId: BigInt!
  slotIndex: BigInt!
  token: Bytes!
  credited: BigDecimal!
  claimed: BigDecimal!
  balance: BigDecimal!
  lastUpdate: Int!
}

# One row per creator-fee CLAIM (escrow Claimed event). Queried by positionId
# (= uint256(poolId), which the token page already derives) so the activity feed
# can show "@handle claimed $X" alongside trades. Immutable.
type Claim @entity(immutable: true) {
  # txHash-logIndex.
  id: ID!
  positionId: BigInt!
  slotIndex: BigInt!
  recipient: Bytes!
  token: Bytes!
  amountUsdc: BigDecimal!
  blockTime: Int!
  blockNumber: BigInt!
  txHash: Bytes!
}

# One row per PUMP graduation (Graduated event). Queried by token so the activity
# feed can show "graduated to the AMM" as a milestone row. Immutable.
type Graduation @entity(immutable: true) {
  # txHash-logIndex.
  id: ID!
  token: Bytes!
  poolId: Bytes!
  usdcRaised: BigDecimal!
  blockTime: Int!
  blockNumber: BigInt!
  txHash: Bytes!
}

# V4 post-graduation fee running totals (id = "v4"), for /stats revenue reads.
type FeeStats @entity(immutable: false) {
  id: ID!
  creatorFeesUsdc: BigDecimal!
  treasuryFeesUsdc: BigDecimal!
  antiSnipeUsdc: BigDecimal!
  # Count of CLANKER collectFees harvests. The USDC value harvested is folded
  # into creatorFeesUsdc/treasuryFeesUsdc via RoyaltyPaid (USDC side only).
  clankerHarvests: BigInt!
  # --- 1.7.0: swap / LP / auto-compound fee categories (all USDC-valued) so
  #     /admin/fees can break revenue down by source instead of estimating. ---
  # Pre-graduation curve trade fee: 1% of every curve Buy/Sell (PUMP: 50/50
  # platform/creator; the frontend applies the split). Accrued in recordTrade.
  curveFeesUsdc: BigDecimal!
  # V2 graduated-pair swap fee (ArcadeV2Pair.LaunchFeePaid): 0.15% protocol +
  # 0.05% creator, taken input-side. USDC legs added directly; token legs valued
  # at the token's last traded price.
  v2ProtocolUsdc: BigDecimal!
  v2CreatorUsdc: BigDecimal!
  # V3 locker LP fees collected (paired USDC side of ArcadeV3Locker.FeesCollected).
  v3LpFeesUsdc: BigDecimal!
  # Auto-compounder protocol fee (USDC leg of ArcadeAutoCompounder.Compounded
  # AND FeesPushed protocolFee0/1, resolved via NPM.positions token0/token1).
  compounderProtocolUsdc: BigDecimal!
  compounderCount: BigInt!
  # --- 1.8.0: complete the revenue map ---
  # CCTP bridge-and-buy fee (ArcadeCctpBuyReceiver.BridgeFeeTaken, USDC).
  bridgeFeesUsdc: BigDecimal!
  # Referral surcharge actually collected (ArcadeV4SwapRouter.ReferralFeePaid).
  referralFeesUsdc: BigDecimal!
}

# ---------------------------------------------------------------------------
# 1.8.0: per-recipient V3 locker LP-fee earnings, so the creator earnings
# dashboard reads the subgraph instead of a client-side RecipientPaid getLogs
# scan. PositionLocked maps a locker positionId -> its launch token; RecipientPaid
# then accrues each payout to (recipient, launchToken).
# ---------------------------------------------------------------------------

# positionId -> launch token + pool, from ArcadeV3Locker.PositionLocked.
type LockerPosition @entity(immutable: false) {
  id: ID! # positionId (decimal string)
  token: Bytes!
  pool: Bytes!
}

# Cumulative LP-fee payouts to one recipient for one launch token (USDC-valued;
# USDC legs direct, token legs at the token's last price). id = `${recipient}-${token}`.
type LockerRecipientEarning @entity(immutable: false) {
  id: ID!
  recipient: Bytes!
  token: Bytes!
  amountUsdc: BigDecimal!
  payoutCount: Int!
  lastPaidAt: Int!
}

# Per-referrer running total of referral surcharge collected on their referred
# swaps (ArcadeV4SwapRouter.ReferralFeePaid). id = referrer address (lowercase).
type Referrer @entity(immutable: false) {
  id: ID!
  totalFeesUsdc: BigDecimal!
  payoutCount: Int!
  lastPaidAt: Int!
}

# First-touch referral attribution, read off the Memo predeploy. id = the
# referred wallet (the Memo SENDER, unforgeable). This replaces the app's
# ~200-window eth_getLogs scan of the Memo contract: Arc caps getLogs at ~10k
# blocks and rate-limits it from serverless IPs, so that scan returned nothing
# from Vercel and no referral was ever seen as confirmed. Indexing it here makes
# "who did X refer, confirmed on-chain?" a single instant query.
#
# `mutable` so first-touch is enforced in the handler (the first tag wins; later
# tags for the same referred wallet are ignored). Self-referral is dropped.
type ReferralAttribution @entity(immutable: false) {
  id: ID! # referred wallet (lowercased hex)
  referrer: Bytes!
  blockNumber: BigInt!
  blockTime: Int!
  txHash: Bytes!
}
