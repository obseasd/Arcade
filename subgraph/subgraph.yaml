# Goldsky subgraph manifest for the Arcade OHLC charts (Arc testnet).
#
# Data sources:
#   - Launchpad Buy/Sell  -> curve/migrated token trades (price from newPriceQ64)
#   - V3 Factory PoolCreated -> records each USDC-paired pool + spawns a V3Pool
#     template (the subgraph factory pattern, analogous to Ponder's factory()).
#   - V3Pool (template) Swap -> pool trades (price from sqrtPriceX96).
#
# `network`: Goldsky's slug for Arc testnet. VERIFY against Goldsky's Arc support
# (their dashboard / `goldsky` CLI). If Goldsky needs a chain config for Arc, set
# it there; the address + startBlock below are the current Safe-governed gen
# (from web/public/deployments.json, found 2026-07-16).
#
# Deploy:  goldsky subgraph deploy arcade-charts/v1 --path .
specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Launchpad
    network: arc-testnet
    source:
      address: "0xB6c9bD475EE6596342c1c49DE6513C9451f8C7e4"
      abi: Launchpad
      startBlock: 52095981
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Trade
        - Trader
        - Token
        - TokenDayData
        - Global
        - GlobalDayData
      abis:
        - name: Launchpad
          file: ./abis/Launchpad.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Buy(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleBuy
        - event: Sell(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleSell
        - event: TokenCreated(indexed address,indexed address,uint8,address,uint16,string,string,string)
          handler: handleTokenCreated
        - event: Migrated(indexed address,indexed address,uint256,uint256)
          handler: handleMigrated
      file: ./src/mappings.ts
  - kind: ethereum
    name: V3Factory
    network: arc-testnet
    source:
      address: "0x7E875574062613de8A4d43cDA21628368914c01A"
      abi: V3Factory
      startBlock: 49467254
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pool
        - PoolDayData
      abis:
        - name: V3Factory
          file: ./abis/V3Factory.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed uint24,int24,address)
          handler: handlePoolCreated
      file: ./src/mappings.ts
  - kind: ethereum
    name: V2Factory
    network: arc-testnet
    source:
      address: "0x3a404154A7Ac320C93BB09A539BcF9B27Fc63067"
      abi: V2Factory
      startBlock: 49467254
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pool
      abis:
        - name: V2Factory
          file: ./abis/V2Factory.json
      eventHandlers:
        - event: PairCreated(indexed address,indexed address,address,uint256)
          handler: handleV2PairCreated
      file: ./src/mappings.ts
  - kind: ethereum
    name: ArcadeHookV4
    network: arc-testnet
    source:
      address: "0x6c307D994ECf5babeab76B0e50c9d0a5FcFABece"
      abi: ArcadeHook
      startBlock: 52470498
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Trade
        - Trader
        - Token
        - TokenDayData
        - Creator
        - Global
        - GlobalDayData
        - V4Pool
        - HandleAttribution
        - FeeStats
      abis:
        - name: ArcadeHook
          file: ./abis/ArcadeHook.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: LaunchCreated(indexed bytes32,indexed address,address,uint8)
          handler: handleLaunchCreatedV4
        - event: TokenLaunched(indexed address,indexed address,uint8,string,string,string)
          handler: handleTokenLaunchedV4
        - event: CurveBuy(indexed bytes32,indexed address,uint256,uint256)
          handler: handleCurveBuyV4
        - event: CurveSell(indexed bytes32,indexed address,uint256,uint256)
          handler: handleCurveSellV4
        - event: Graduated(indexed bytes32,uint256,uint256)
          handler: handleGraduatedV4
        - event: RoyaltyPaid(indexed bytes32,indexed address,uint256,uint256,address)
          handler: handleRoyaltyPaidV4
        - event: AntiSnipeApplied(indexed bytes32,indexed address,uint256,uint16)
          handler: handleAntiSnipeV4
        - event: FeeAttributedToHandle(indexed bytes32,indexed address,string)
          handler: handleFeeAttributedV4
        - event: FeeHarvested(indexed bytes32,uint256,uint256)
          handler: handleFeeHarvestedV4
      file: ./src/mappings.ts
  - kind: ethereum
    name: TwitterEscrowV4
    network: arc-testnet
    source:
      address: "0x41B0341dd65d3B7c350225b551c9826787325901"
      abi: ArcadeTwitterEscrowV4
      startBlock: 52470498
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - EscrowSlot
      abis:
        - name: ArcadeTwitterEscrowV4
          file: ./abis/ArcadeTwitterEscrowV4.json
      eventHandlers:
        - event: Credited(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleEscrowCredited
        - event: Claimed(indexed uint256,indexed uint256,indexed address,address,uint256)
          handler: handleEscrowClaimed
      file: ./src/mappings.ts
  # V3 locker: LP fees collected from locked CLANKER_V3 positions. FeesCollected
  # gives the paired (USDC) side directly -> the "V3 LP fees" /admin/fees category.
  - kind: ethereum
    name: V3Locker
    network: arc-testnet
    source:
      address: "0xBaAfC02fEAd665D398Cf8f53bE9C713c321c9eEB"
      abi: ArcadeV3Locker
      startBlock: 49467254
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FeeStats
        - LockerPosition
        - LockerRecipientEarning
        - Token
      abis:
        - name: ArcadeV3Locker
          file: ./abis/ArcadeV3Locker.json
      eventHandlers:
        - event: FeesCollected(indexed uint256,uint256,uint256)
          handler: handleV3LockerFees
        - event: PositionLocked(indexed uint256,indexed address,address,uint128)
          handler: handlePositionLocked
        - event: RecipientPaid(indexed uint256,indexed uint256,indexed address,address,uint256)
          handler: handleLockerRecipientPaid
      file: ./src/mappings.ts
  # Auto-compounder: protocol fee taken on each V3-position compound. The event
  # carries only tokenId, so handleCompounded resolves token0/token1 (which side
  # is USDC) via an NPM.positions eth_call -> the "Auto-compound" fee category.
  - kind: ethereum
    name: AutoCompounder
    network: arc-testnet
    source:
      address: "0x2DC0ABb9945506F78bf2490332329BA05E6541a8"
      abi: ArcadeAutoCompounder
      startBlock: 49467254
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FeeStats
      abis:
        - name: ArcadeAutoCompounder
          file: ./abis/ArcadeAutoCompounder.json
        - name: NonfungiblePositionManager
          file: ./abis/NonfungiblePositionManager.json
      eventHandlers:
        - event: Compounded(indexed uint256,indexed address,uint256,uint256,uint256,uint256,uint128,uint256,uint256,uint256,uint256)
          handler: handleCompounded
        - event: FeesPushed(indexed uint256,indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleCompounderFeesPushed
      file: ./src/mappings.ts
  # CCTP bridge-and-buy receiver: BridgeFeeTaken -> the bridge-fee revenue line.
  # Address = NEXT_PUBLIC_CCTP_BUY_RECEIVER default (web/lib/constants.ts). TESTNET
  # value; CCTP addresses differ on mainnet -> BUMP for a mainnet subgraph.
  - kind: ethereum
    name: CctpReceiver
    network: arc-testnet
    source:
      address: "0x939440Dd711499f26e101261cB956AA80E6B6fA2"
      abi: ArcadeCctpReceiver
      startBlock: 49467254
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FeeStats
      abis:
        - name: ArcadeCctpReceiver
          file: ./abis/ArcadeCctpReceiver.json
      eventHandlers:
        - event: BridgeFeeTaken(uint256)
          handler: handleBridgeFeeTaken
      file: ./src/mappings.ts
  # ArcadeV4SwapRouter: ReferralFeePaid -> per-referrer realized referral revenue
  # (the referral surcharge is default-0, so this is often empty until enabled).
  - kind: ethereum
    name: V4SwapRouter
    network: arc-testnet
    source:
      address: "0x9Ef130336B37E81d3013e806a32f9BcB6687453E"
      abi: ArcadeV4SwapRouter
      startBlock: 52470498
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FeeStats
        - Referrer
        - Token
      abis:
        - name: ArcadeV4SwapRouter
          file: ./abis/ArcadeV4SwapRouter.json
      eventHandlers:
        - event: ReferralFeePaid(indexed address,indexed address,uint256)
          handler: handleReferralFeePaid
      file: ./src/mappings.ts
  # Canonical Uniswap V4 PoolManager. Its Swap event is the ONLY on-chain signal
  # for trades on V4 pools once they leave the curve: PUMP post-graduation AND
  # every CLANKER swap (CLANKER is a V4 pool from birth). handleV4Swap filters to
  # our pools via the V4Pool registry (keyed by PoolId), so the shared
  # PoolManager's other pools are ignored. startBlock tracks the ArcadeHookV4
  # data source (our pools are created at/after the hook) - BUMP IT with the hook
  # address at each redeploy.
  - kind: ethereum
    name: PoolManagerV4
    network: arc-testnet
    source:
      address: "0x71CCed1c397EC974E74C350eBA6DBa98DE8e8e25"
      abi: PoolManagerV4
      startBlock: 52470498
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Trade
        - Trader
        - Token
        - TokenDayData
        - Creator
        - Global
        - GlobalDayData
        - V4Pool
      abis:
        - name: PoolManagerV4
          file: ./abis/PoolManagerV4.json
      eventHandlers:
        - event: Swap(indexed bytes32,indexed address,int128,int128,uint160,uint128,int24,uint24)
          handler: handleV4Swap
      file: ./src/mappings.ts
templates:
  # ERC20 Transfer template, spawned per launched token (ArcadeToken.create in
  # handleTokenCreated / handleTokenLaunchedV4) so holder balances are indexed
  # from launch without a client-side Transfer scan.
  - kind: ethereum
    name: ArcadeToken
    network: arc-testnet
    source:
      abi: ERC20
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokenBalance
        - Token
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings.ts
  - kind: ethereum
    name: V3Pool
    network: arc-testnet
    source:
      abi: V3Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Trade
        - Pool
        - PoolDayData
        - Trader
        - Global
        - GlobalDayData
      abis:
        - name: V3Pool
          file: ./abis/V3Pool.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
      file: ./src/mappings.ts
  # V2 pair template (spawned on PairCreated). Sync gives exact reserves after
  # every mint/burn/swap, so the pool's USDC-side reserve -> TVL is exact.
  - kind: ethereum
    name: V2Pair
    network: arc-testnet
    source:
      abi: V2Pair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pool
        - Global
        - GlobalDayData
        - FeeStats
        - Token
        - Trade
        - Trader
        - Creator
        - TokenDayData
        - PoolDayData
      abis:
        - name: V2Pair
          file: ./abis/V2Pair.json
      eventHandlers:
        - event: Sync(uint112,uint112)
          handler: handleV2Sync
        - event: LaunchFeePaid(indexed address,uint256,uint256)
          handler: handleV2LaunchFee
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleV2Swap
      file: ./src/mappings.ts
