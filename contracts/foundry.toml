[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# No global solc_version pin: foundry auto-detects per file pragma so our
# 0.8.24 contracts and the Uniswap V3 fork (=0.7.6) compile side by side.
auto_detect_solc = true
optimizer = true
# Bumped DOWN from 200 to 1 to keep ArcadeLaunchpad below EIP-170's
# 24,576-byte bytecode limit after the audit-2 additions (CSEC-018,
# MATH-001/002, CSEC-013 fee field, creator-buy slippage, slot0 verify,
# swap-migrated guard). optimizer_runs=1 favours deployment size at the
# cost of slightly more expensive runtime; for a launchpad called a few
# hundred times per token, the runtime overhead is negligible compared
# to a redeploy block. Revisit if/when the contract is restructured into
# a router + delegate libraries pattern.
optimizer_runs = 1
via_ir = true
# Strip the metadata trailer so the bytecode is the bare minimum needed
# to deploy. Saves ~52-100 bytes per contract; matters for ArcadeLaunchpad
# which sits within ~30 bytes of EIP-170's 24,576 limit.
bytecode_hash = "none"
cbor_metadata = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
]
fs_permissions = [{ access = "read-write", path = "./" }]
# v3-core / v3-periphery are =0.7.6 and were authored without IR. Skip them in
# the default (via_ir) build; they're compiled by the dedicated `v3` profile
# below and deployed from their artifacts.
# orbs/ is the orbs-network/twap vendored repo (Solidity 0.8.16); compiled by
# the dedicated `orbs` profile so it never gets pulled into the default 0.8.24
# build.
skip = [
    "lib/v3-core/**",
    "lib/v3-periphery/**",
    # v4-core + v4-periphery (and permit2 vendored inside v4-periphery)
    # are only compiled by the dedicated `v4` profile. Their nested
    # submodules (permit2/lib/openzeppelin-contracts, permit2/lib/solmate,
    # certora/munged/...) are not part of our install, so the default
    # 0.8.24 profile must explicitly skip them or `forge build` chokes on
    # missing imports it has no business touching.
    "lib/v4-core/**",
    "lib/v4-periphery/**",
    "orbs/**",
]

# Dedicated profile for the 0.7.6 layer: our own V3 contracts (v3src/) plus
# the Uniswap V3 fork they depend on. Native V3 settings (0.7.6, legacy
# codegen, no IR). `test`/`script` point at non-existent dirs so this profile
# never drags in our 0.8 contracts (which require via_ir). Artifacts in out-v3.
#
# Prerequisite for ArcadeV3PositionManager (NPM fork):
#   rm -rf lib/oz-v3
#   forge install oz-v3=OpenZeppelin/openzeppelin-contracts@v3.4.1-solc-0.7-2 --no-git
# That pulls the 0.7-compatible OZ branch (which v3-periphery imports as
# @openzeppelin/contracts/...) into lib/oz-v3/, used only by this profile via
# the remapping override below. The "alias=" prefix is the foundry syntax
# for a renamed install (older forge versions do not support --rename).
[profile.v3]
src = "v3src"
test = "v3src/_none"
script = "v3src/_none"
out = "out-v3"
libs = ["lib"]
skip = []
optimizer = true
optimizer_runs = 200
via_ir = false
auto_detect_solc = true
remappings = [
    "@openzeppelin/contracts/=lib/oz-v3/contracts/",
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "forge-std/=lib/forge-std/src/",
]

# V4 prototype profile (anti-sniper hook). Strictly isolated to `v4src/`
# and `v4test/` so the default and v3 builds never touch it - lets us
# develop the V4 path without any coupling risk on the production V2/V3
# stack. Solidity 0.8.26 minimum (V4 needs transient storage / EIP-1153,
# confirmed supported on Arc per reference_arc_testnet).
[profile.v4]
src = "v4src"
test = "v4test"
script = "v4script"
out = "out-v4"
libs = ["lib"]
# v4-core has its own test/ folder we don't want compiled into our out-v4.
# Same for v4-periphery once added.
# v4-periphery vendors permit2; permit2's own certora/ + test/ have unmet
# external deps (forge-gas-snapshot, certora/munged generated dirs) that
# we never need to build for our hook prototype.
skip = [
    "lib/v4-core/test/**",
    "lib/v4-periphery/test/**",
    "lib/v4-periphery/lib/permit2/test/**",
    "lib/v4-periphery/lib/permit2/script/**",
    "lib/v4-periphery/lib/permit2/lib/openzeppelin-contracts/certora/**",
    "lib/v4-periphery/lib/permit2/lib/openzeppelin-contracts/test/**",
]
optimizer = true
optimizer_runs = 200
via_ir = true
solc_version = "0.8.26"
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    # v4-core upstream — vendored under lib/v4-core. Mirrors the import paths
    # the canonical V4 examples use, so our `v4src/` imports work the same
    # whether read from this repo or the upstream one.
    "@uniswap/v4-core/=lib/v4-core/",
    "v4-core/=lib/v4-core/src/",
    # v4-periphery for PositionManager, V4Quoter, StateView, LiquidityAmounts.
    "@uniswap/v4-periphery/=lib/v4-periphery/",
    "v4-periphery/=lib/v4-periphery/src/",
    # Permit2 - required by PositionManager.
    "permit2/=lib/v4-periphery/lib/permit2/",
    # v4-core's own deps. solmate is v4-core-only.
    "solmate/=lib/v4-core/lib/solmate/",
]

# Vendored orbs-network/twap (MIT, ~2022). Compiled standalone in 0.8.16 with
# their own optimizer settings (1M runs, no IR) and their own forge-std + OZ
# vendored under orbs/lib. We never edit anything under orbs/ ; this profile
# only builds the artifacts so we can deploy TWAP + ExchangeV2 to Arc testnet
# via their bundled DeployTWAP.s.sol + DeployExchange.s.sol scripts.
#
# Usage (from contracts/ dir):
#   forge build --profile orbs
#   forge script orbs/script/DeployExchange.s.sol --profile orbs \
#     --rpc-url arc_testnet --broadcast \
#     --private-key $PRIVATE_KEY
#   forge script orbs/script/DeployTWAP.s.sol --profile orbs \
#     --rpc-url arc_testnet --broadcast \
#     --private-key $PRIVATE_KEY
#
# Required env vars:
#   ROUTER   = ArcadeV2Router address (for ExchangeV2)
#   ALLOWED  = comma-separated keeper addresses allowed to fill orders
#   WETH     = MockWETH or sentinel for TWAP constructor (UI gates dstToken
#              so the unwrap path is unreachable; any non-zero is fine)
#   PRIVATE_KEY = deployer key
[profile.orbs]
src = "orbs/src"
test = "orbs/test"
script = "orbs/script"
out = "out-orbs"
libs = ["orbs/lib"]
skip = []
solc_version = "0.8.16"
optimizer = true
optimizer_runs = 1_000_000
via_ir = false
fs_permissions = [{ access = "read-write", path = "./" }]
remappings = [
    "@openzeppelin/contracts/=orbs/lib/openzeppelin-contracts/contracts/",
    "openzeppelin-contracts/=orbs/lib/openzeppelin-contracts/contracts/",
    "forge-std/=orbs/lib/forge-std/src/",
    "ds-test/=orbs/lib/forge-std/lib/ds-test/src/",
    "src/=orbs/src/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
arc = "https://rpc.testnet.arc.network"
arc_testnet = "https://rpc.testnet.arc.network"
arc_testnet_thirdweb = "https://5042002.rpc.thirdweb.com"
anvil = "http://127.0.0.1:8545"
