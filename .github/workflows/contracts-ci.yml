name: contracts CI

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-ci.yml'
  pull_request:
    paths:
      - 'contracts/**'

jobs:
  forge:
    name: forge build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Patch v3-periphery's PoolAddress.POOL_INIT_CODE_HASH so the NPM
      # computes the address that our Foundry-built UniswapV3Pool actually
      # deploys to. Idempotent, see contracts/scripts/patch-v3-periphery.sh
      # and memory/project_arcade_v3_init_hash.md for the full rationale.
      - name: patch v3-periphery init hash
        run: bash scripts/patch-v3-periphery.sh

      # The V3 layer (Uniswap V3 fork in 0.7.6 + our v3src/) lives in a separate
      # foundry profile because of the Solidity version split. Build it FIRST so
      # the default-profile DeploySecurityV3.s.sol script can vm.getCode the
      # out-v3/ artifacts.
      - name: build V3 (0.7.6) profile
        run: FOUNDRY_PROFILE=v3 forge build --sizes
        env:
          # solar lint warning about 0.8.0+ is harmless on 0.7.6
          FOUNDRY_FUZZ_RUNS: 256

      - name: build default (0.8.24) profile
        run: FOUNDRY_PROFILE=default forge build --sizes

      - name: forge test
        run: FOUNDRY_PROFILE=default forge test -vv
        env:
          FOUNDRY_FUZZ_RUNS: 256

      # Format check is non-blocking on green; it gates the merge only when the
      # code actually deviates from the project style.
      - name: forge fmt --check
        run: FOUNDRY_PROFILE=default forge fmt --check
        continue-on-error: true

  web:
    name: web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
