name: compounder reconcile

# POST /api/compounder/reconcile every hour. The handler scans the
# last 50k blocks (~7h of headroom) of Compounder events and
# reconciles them into the DB via the existing insertEvent /
# upsertPosition / markWithdrawn helpers. ON CONFLICT DO NOTHING +
# the UNIQUE(tx_hash) index from migration 003 keep the writes
# idempotent, so an overlap with the keeper's 5-min cron is safe.
#
# Cadence rationale: hourly balances coverage against function-budget
# cost. The keeper's 5-min cron writes events on its own happy path;
# this worker catches the two failure modes the keeper misses —
# a transient 503 between writeContract and insertEvent (silent gap)
# and a direct on-chain interaction via Etherscan / safeTransferFrom
# (the keeper never sees these). Hourly catches both within an SLA
# the team can act on.
#
# Required secrets (same as compounder-scan):
#   COMPOUNDER_CRON_URL    : Full URL, e.g.
#                            https://www.arcade.trading/api/compounder/reconcile
#                            (NOTE the /reconcile suffix; the secret
#                            is the same as the main cron because the
#                            domain is identical).
#   COMPOUNDER_CRON_SECRET : Bearer secret matching Vercel env
#                            COMPOUNDER_CRON_SECRET.

on:
  schedule:
    # Top of every hour, UTC.
    - cron: "0 * * * *"
  workflow_dispatch: {}

# Cancel an in-flight run if a new one starts. The scan is idempotent
# so overlap is safe, but running two parallel sweeps wastes Vercel
# function budget.
concurrency:
  group: compounder-reconcile
  cancel-in-progress: true

jobs:
  reconcile:
    name: POST /api/compounder/reconcile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: fire reconcile
        env:
          # Two ways to point this workflow at the right endpoint:
          # (1) Set COMPOUNDER_RECONCILE_URL as a dedicated repo secret —
          #     unambiguous, recommended.
          # (2) Set only COMPOUNDER_CRON_URL — the workflow trims the
          #     trailing /cron (and any trailing slash) and appends
          #     /reconcile. Works for the canonical layout but fails
          #     silently if the operator's secret has a typo, an
          #     unexpected trailing slash, or a query string.
          # The dedicated secret wins when both are set.
          COMPOUNDER_RECONCILE_URL: ${{ secrets.COMPOUNDER_RECONCILE_URL }}
          COMPOUNDER_CRON_URL: ${{ secrets.COMPOUNDER_CRON_URL }}
          COMPOUNDER_CRON_SECRET: ${{ secrets.COMPOUNDER_CRON_SECRET }}
        run: |
          if [ -z "$COMPOUNDER_CRON_SECRET" ]; then
            echo "Missing COMPOUNDER_CRON_SECRET repo secret"
            exit 1
          fi

          if [ -n "$COMPOUNDER_RECONCILE_URL" ]; then
            RECONCILE_URL="$COMPOUNDER_RECONCILE_URL"
          elif [ -n "$COMPOUNDER_CRON_URL" ]; then
            # Robust rewrite: strip any trailing slashes first, then
            # strip a trailing /cron (with or without further slashes),
            # then append /reconcile. Handles "...cron", "...cron/",
            # "...cron/?" and "...cron//" without producing double
            # slashes in the final URL.
            BASE="${COMPOUNDER_CRON_URL%%[?#]*}"
            BASE="${BASE%/}"
            BASE="${BASE%/cron}"
            RECONCILE_URL="${BASE%/}/reconcile"
          else
            echo "Set either COMPOUNDER_RECONCILE_URL or COMPOUNDER_CRON_URL"
            exit 1
          fi

          # Echo the path (NOT the secret) so a future 404 has a clear
          # diagnostic trail in the workflow logs without leaking the
          # bearer token.
          echo "Reconcile URL: $RECONCILE_URL"

          curl --fail-with-body \
               --max-time 90 \
               --retry 2 \
               --retry-delay 10 \
               -X POST \
               -H "Authorization: Bearer $COMPOUNDER_CRON_SECRET" \
               -H "Content-Type: application/json" \
               "$RECONCILE_URL"
